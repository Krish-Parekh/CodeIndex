services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: code-indexer-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - ./.qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
